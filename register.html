<h1>Register</h1>

<input id="u">
<input id="p" type="password">
<button onclick="reg()">Register</button>

<script>
async function reg() {
  await fetch("/api/register", {
    method: "POST",
    body: JSON.stringify({ username: u.value, password: p.value })
  });

  location.href = "/login.html";
}
</script>
