<h1>Login</h1>

<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="login()">Login</button>

<script>
async function login() {
  const res = await fetch("/api/login", {
    method: "POST",
    body: JSON.stringify({
      username: u.value,
      password: p.value
    })
  });

  if (res.ok) {
    location.href = "/index.html";
  } else {
    alert("Login failed");
  }
}
</script>
