<h1>Playlists</h1>
<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/api/playlists");
  const data = await res.json();

  list.innerHTML = data.map(p => `
    <div>
      <h3>${p.name}</h3>
      <a href="/playlist.html?id=${p.id}">Open</a>
    </div>
  `).join("");
}
load();
</script>
