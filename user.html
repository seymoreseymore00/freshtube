<h1 id="name">Profile</h1>
<p id="bio"></p>

<h2>Playlists</h2>
<div id="playlists"></div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
  const res = await fetch(`/api/user?id=${id}`);
  const data = await res.json();

  name.innerText = data.display_name || data.username;
  bio.innerText = data.bio;

  playlists.innerHTML = data.playlists.map(p => `
    <div>
      <h3>${p.name}</h3>
      <a href="/playlist.html?id=${p.id}&user=1">Open</a>
    </div>
  `).join("");
}

load();
</script>
